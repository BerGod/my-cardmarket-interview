apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - nginx.yaml 

images:
    - name: nginx
      newName: ghcr.io/bergod/my-nginx
      newTag: 0.0.1


### If you want to use another image instead of the one built by you, you can change the newName and newTag fields to point to the desired image